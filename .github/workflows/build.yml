# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build SQuiL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7.0.0
      
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5.3.0
      with:
        dotnet-version: 10.0.x
        
    - name: Restore Dependencies
      run: dotnet restore
      
    - name: Build Generator
      run: dotnet build --no-restore -c Release "./SQuiL.SourceGenerator/SQuiL.SourceGenerator.csproj"

    - name: Build Tests
      run: dotnet build --no-restore "./SQuiL.Tests/SQuiL.Tests.csproj"

    - name: Test Generator
      run: dotnet test --no-build --verbosity normal "./SQuiL.Tests/SQuiL.Tests.csproj"

    # The required `build` check must also exercise the VS Code extension, so a
    # dependency bump that breaks `tsc` / `vsce package` is caught on the PR
    # (before Renovate automerge) instead of only failing later in publish.
    # This is the gap that let npm bumps break publish runs #154/#155: `build`
    # validated only the .NET side, so a broken VS Code dev-dep sailed through.
    # `vsce package` runs vscode:prepublish (sync-shared + tsc), so this single
    # step covers both compilation and packaging.
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 20.x

    - name: Install VS Code Extension Dependencies
      working-directory: ./SQuiL.VSCodeExtension
      run: npm ci

    - name: Package VS Code Extension (compile + vsce)
      working-directory: ./SQuiL.VSCodeExtension
      run: npx --no-install @vscode/vsce package --allow-missing-repository
