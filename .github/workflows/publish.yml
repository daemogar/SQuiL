# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Publish SQuiL

# Every push to master publishes a -beta prerelease. An official (stable)
# release is triggered manually from the Actions tab (workflow_dispatch):
# same pipeline, same assets, but the tag has no -beta suffix and the GitHub
# release is not marked prerelease. PRs are validated by build.yml only —
# they must never publish.
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      version:
        # Keep this default in sync with NEXT_VERSION below — it is the next
        # planned official release, pre-filled so the Actions form shows it.
        description: 'Official release version (plain SemVer, e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  PROJECT: SQuiL
  DIRECTORY: SQuiL.SourceGenerator
  # The next planned official release. Betas are cut as
  # <NEXT_VERSION>-beta.<run#> so they always compare BELOW the official
  # they precede (SemVer rule 11). Keep in sync with the workflow_dispatch
  # `version` input default above; bump both right after each official ships.
  NEXT_VERSION: '1.0.0'

jobs:
  build:

    runs-on: ubuntu-latest

    # Expose the computed release version (and channel) so the VSIX jobs can
    # attach their assets to the very same release/tag this job creates.
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4.1.1

    - name: Git Fetch
      run: git fetch --prune --unshallow

    - name: Setup DotNet
      uses: actions/setup-dotnet@v4.0.0
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      working-directory: ./${{ env.DIRECTORY }}
      run: dotnet restore

    - name: Build ${{ env.PROJECT }}
      working-directory: ./${{ env.DIRECTORY }}
      run: dotnet build --no-restore -c Release

    # push to master        → <NEXT_VERSION>-beta.<run#>, marked prerelease
    # workflow_dispatch     → official: the required version input, plain
    #                         SemVer only, full (non-prerelease) release.
    - name: Set Release Version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ inputs.version }}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release version '$VERSION' must be plain SemVer (MAJOR.MINOR.PATCH, e.g. 1.0.0)."
            exit 1
          fi
          PRERELEASE=false
        else
          VERSION="${{ env.NEXT_VERSION }}-beta.${{ github.run_number }}"
          PRERELEASE=true
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        echo "PRERELEASE=$PRERELEASE" >> "$GITHUB_ENV"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: ${{ env.VERSION }}
        name: ${{ env.VERSION }}
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: ${{ env.PRERELEASE }}
        artifactErrorsFailBuild: true

    - name: Pack ${{ env.PROJECT }}.SourceGenerator
      env:
        RELEASE_NOTE: https://github.com/daemogar/${{ env.PROJECT }}/releases/tag/${{ env.VERSION }}
      working-directory: ./${{ env.DIRECTORY }}
      run: dotnet pack -c Release --include-symbols -p:SymbolPackageFormat=snupkg /p:Version=${{ env.VERSION }} /p:PackageReleaseNotes="See ${{ env.RELEASE_NOTE }}"

    - name: Push Nuget
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      working-directory: ./${{ env.DIRECTORY }}
      run: dotnet nuget push **/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json

  # ───────────────────────────────────────────────────────────────────────
  # Build the two compiled VSIX extensions — SSMS and Visual Studio 2026 —
  # and attach them, plus their install docs, to the release created above.
  #
  # This runs on Windows because each VSIX is a classic net472 VSPackage:
  # CreateVsixContainer / GeneratePkgDef / VSCTCompile are VSSDK targets that
  # only run under full MSBuild.exe (not `dotnet build` on Linux). VSSDK comes
  # from the Microsoft.VSSDK.BuildTools NuGet package, so no VS "extension
  # development" workload needs to be pre-installed on the runner.
  #
  # It must be a separate job rather than a separate workflow: a release
  # created with GITHUB_TOKEN does NOT trigger `on: release` workflows, so a
  # release-triggered workflow would never fire. `needs: build` shares the
  # version/tag and guarantees the release exists before we upload to it.
  # ───────────────────────────────────────────────────────────────────────
  vsix-extensions:

    needs: build
    runs-on: windows-latest

    env:
      SSMS_PROJECT: SQuiL.SsmsExtension/SQuiL.SsmsExtension.csproj
      SSMS_OUTPUT: SQuiL.SsmsExtension/bin/Release
      SSMS_MANIFEST: SQuiL.SsmsExtension/source.extension.vsixmanifest
      VS_PROJECT: SQuiL.VisualStudioExtension/SQuiL.VisualStudioExtension.csproj
      VS_OUTPUT: SQuiL.VisualStudioExtension/bin/Release
      VS_INSTALL_DOC: SQuiL.VisualStudioExtension/Distribution/INSTALL-VisualStudio.md
      VS_MANIFEST: SQuiL.VisualStudioExtension/source.extension.vsixmanifest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4.1.1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup DotNet
      uses: actions/setup-dotnet@v4.0.0
      with:
        dotnet-version: 10.0.x

    # ── SSMS extension ────────────────────────────────────────────────────
    - name: Restore SSMS Extension
      run: msbuild ${{ env.SSMS_PROJECT }} /t:Restore /p:Configuration=Release

    # Stamp a unique, increasing VSIX version (1.0.<run_number>) so VSIXInstaller
    # never skips a release-to-release upgrade as "already installed" — same
    # treatment the VS manifest gets below. Unlike the VS manifest (pinned at
    # 1.0.0 in source), the SSMS manifest's committed version drifts with local
    # dev bumps, so the regex accepts any current value within <Identity …>.
    - name: Stamp SSMS extension version
      shell: pwsh
      run: |
        $p = "${{ env.SSMS_MANIFEST }}"
        $ver = "1.0.${{ github.run_number }}"
        $c = Get-Content $p -Raw
        $stamped = $c -replace '(<Identity\s+Id="[^"]*"\s+Version=")[^"]+(")', "`${1}$ver`$2"
        if ($stamped -eq $c) {
          throw "Failed to stamp SSMS extension version — '<Identity … Version=""…"">' not found in $p."
        }
        Set-Content $p -Value $stamped -Encoding UTF8
        Write-Host "Stamped SSMS extension Identity Version = $ver."

    # Bake this release's tag into the compiled assembly so the update checker
    # can compare itself against GitHub releases (dev builds keep the
    # __SQUIL_RELEASE_TAG__ placeholder and skip the check).
    - name: Stamp release tag into SSMS BuildInfo.cs
      shell: pwsh
      run: |
        $p = "SQuiL.SsmsExtension/Update/BuildInfo.cs"
        $stamped = (Get-Content $p -Raw) -replace '__SQUIL_RELEASE_TAG__', '${{ needs.build.outputs.version }}'
        if ($stamped -notmatch [regex]::Escape('${{ needs.build.outputs.version }}')) {
          throw "Failed to stamp release tag into SSMS BuildInfo.cs — placeholder not found."
        }
        Set-Content $p -Value $stamped -Encoding UTF8
        Write-Host "Stamped SSMS BuildInfo.cs with '${{ needs.build.outputs.version }}'."

    - name: Build SSMS Extension (VSIX)
      run: msbuild ${{ env.SSMS_PROJECT }} /t:Build /p:Configuration=Release /p:DeployExtension=false

    # The build copies Distribution\INSTALL.md and Distribution\install.cmd to
    # the output root (see the .csproj), so all three SSMS assets sit together.

    # Bake this release's tag into install.cmd so a downloaded copy installs
    # the exact matching .vsix with no version argument (replaces the
    # __SQUIL_RELEASE_TAG__ placeholder in the PowerShell body of the polyglot).
    - name: Stamp release version into install.cmd
      shell: pwsh
      run: |
        $p = "${{ env.SSMS_OUTPUT }}/install.cmd"
        $stamped = (Get-Content $p -Raw) -replace '__SQUIL_RELEASE_TAG__', '${{ needs.build.outputs.version }}'
        if ($stamped -notmatch [regex]::Escape('${{ needs.build.outputs.version }}')) {
          throw "Failed to stamp release tag into install.cmd — placeholder __SQUIL_RELEASE_TAG__ not found."
        }
        Set-Content $p -Value $stamped -Encoding UTF8
        Write-Host "Stamped install.cmd with release tag '${{ needs.build.outputs.version }}'."

    # ── Visual Studio 2026 extension ──────────────────────────────────────
    # Stamp a unique, increasing VSIX version (1.0.<run_number>) so VSIXInstaller
    # never skips a re-install as "already installed" across releases. Only the
    # <Identity …> element is touched; the regex is anchored to it.
    - name: Stamp Visual Studio extension version
      shell: pwsh
      run: |
        $p = "${{ env.VS_MANIFEST }}"
        $ver = "1.0.${{ github.run_number }}"
        $c = Get-Content $p -Raw
        $stamped = $c -replace '(<Identity\s+Id="[^"]*"\s+Version=")1\.0\.0(")', "`${1}$ver`$2"
        if ($stamped -eq $c) {
          throw "Failed to stamp VS extension version — '<Identity … Version=""1.0.0"">' not found in $p."
        }
        Set-Content $p -Value $stamped -Encoding UTF8
        Write-Host "Stamped VS extension Identity Version = $ver."

    - name: Restore Visual Studio Extension
      run: msbuild ${{ env.VS_PROJECT }} /t:Restore /p:Configuration=Release

    - name: Stamp release tag into VS BuildInfo.cs
      shell: pwsh
      run: |
        $p = "SQuiL.VisualStudioExtension/Update/BuildInfo.cs"
        $stamped = (Get-Content $p -Raw) -replace '__SQUIL_RELEASE_TAG__', '${{ needs.build.outputs.version }}'
        if ($stamped -notmatch [regex]::Escape('${{ needs.build.outputs.version }}')) {
          throw "Failed to stamp release tag into VS BuildInfo.cs — placeholder not found."
        }
        Set-Content $p -Value $stamped -Encoding UTF8
        Write-Host "Stamped VS BuildInfo.cs with '${{ needs.build.outputs.version }}'."

    - name: Build Visual Studio Extension (VSIX)
      run: msbuild ${{ env.VS_PROJECT }} /t:Build /p:Configuration=Release /p:DeployExtension=false

    - name: Verify release assets exist
      shell: pwsh
      run: |
        $files = @(
          "${{ env.SSMS_OUTPUT }}/SQuiL.SsmsExtension.vsix",
          "${{ env.SSMS_OUTPUT }}/INSTALL.md",
          "${{ env.SSMS_OUTPUT }}/install.cmd",
          "${{ env.VS_OUTPUT }}/SQuiL.VisualStudioExtension.vsix",
          "${{ env.VS_INSTALL_DOC }}"
        )
        $missing = $files | Where-Object { -not (Test-Path $_) }
        if ($missing) { throw "Missing expected release asset(s): $($missing -join ', ')" }
        Get-ChildItem $files | Select-Object Name, Length

    - name: Attach VSIX assets to release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: ${{ needs.build.outputs.version }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        omitNameDuringUpdate: true
        omitBodyDuringUpdate: true
        replacesArtifacts: true
        prerelease: ${{ needs.build.outputs.prerelease }}
        artifactErrorsFailBuild: true
        artifacts: "${{ env.SSMS_OUTPUT }}/SQuiL.SsmsExtension.vsix,${{ env.SSMS_OUTPUT }}/INSTALL.md,${{ env.SSMS_OUTPUT }}/install.cmd,${{ env.VS_OUTPUT }}/SQuiL.VisualStudioExtension.vsix,${{ env.VS_INSTALL_DOC }}"

  # ───────────────────────────────────────────────────────────────────────
  # Build the VS Code extension VSIX (squil-editor-<version>.vsix) and attach
  # it — plus its install doc — to the release. Pure Node tooling, so this
  # runs on Linux. `vsce package` runs `vscode:prepublish` (sync-shared +
  # tsc compile) first, so the shared grammar/guide assets are bundled.
  # ───────────────────────────────────────────────────────────────────────
  vscode-extension:

    needs: build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SQuiL.VSCodeExtension

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4.1.1

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm ci

    - name: Stamp release tag into buildInfo.ts
      shell: pwsh
      run: |
        $p = "src/buildInfo.ts"
        $stamped = (Get-Content $p -Raw) -replace '__SQUIL_RELEASE_TAG__', '${{ needs.build.outputs.version }}'
        if ($stamped -notmatch [regex]::Escape('${{ needs.build.outputs.version }}')) {
          throw "Failed to stamp release tag into buildInfo.ts — placeholder not found."
        }
        Set-Content $p -Value $stamped -Encoding UTF8
        Write-Host "Stamped buildInfo.ts with '${{ needs.build.outputs.version }}'."

    - name: Package VS Code Extension (VSIX)
      run: npx --no-install @vscode/vsce package --allow-missing-repository

    - name: Verify VS Code asset exists
      shell: pwsh
      run: |
        $vsix = Get-ChildItem -Filter 'squil-editor-*.vsix' | Select-Object -First 1
        if (-not $vsix) { throw "VS Code VSIX not produced (squil-editor-*.vsix not found)." }
        if (-not (Test-Path 'INSTALL-VSCode.md')) { throw "Missing INSTALL-VSCode.md." }
        Get-ChildItem $vsix.FullName, 'INSTALL-VSCode.md' | Select-Object Name, Length

    - name: Attach VS Code assets to release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: ${{ needs.build.outputs.version }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        omitNameDuringUpdate: true
        omitBodyDuringUpdate: true
        replacesArtifacts: true
        prerelease: ${{ needs.build.outputs.prerelease }}
        artifactErrorsFailBuild: true
        artifacts: "SQuiL.VSCodeExtension/squil-editor-*.vsix,SQuiL.VSCodeExtension/INSTALL-VSCode.md"
