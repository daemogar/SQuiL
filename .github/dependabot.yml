# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# NOTE: Dependabot opens a separate PR per ecosystem (npm / nuget /
# github-actions) — it cannot merge updates across ecosystems into one PR.
# Each ecosystem below is fully grouped, so the worst case is ONE grouped PR
# per ecosystem per week (3 total) rather than one PR per package.
version: 2
updates:
  # NuGet packages across the solution.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  # VS Code extension build/dev tooling (npm). All deps here are dev-only and
  # never shipped in the published .vsix, so collapse them into one weekly PR.
  - package-ecosystem: "npm"
    directory: "/SQuiL.VSCodeExtension"
    schedule:
      interval: "weekly"
    groups:
      npm-dev-dependencies:
        patterns:
          - "*"

  # GitHub Actions pinned in the workflows (.github/workflows).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
